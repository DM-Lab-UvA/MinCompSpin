name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
jobs:
  build:
    runs-on: ${{ matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |  
          sudo apt-get update
          sudo apt-get install -y g++ cmake python3 python3-pytest
          
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest
      
      - name : Build project
        run: |
          bash install.sh

      - name : Test project
        run: |
          cd build
          ctest --output-on-failure
      
      - name : Test python module
        run: |
          cd mcmpy/tests
          pytest
